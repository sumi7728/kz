<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>夢糖庭院</title>
  <link rel="icon" href="images/icon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <button class="icon-btn back-btn" id="backBtn" onclick="goBack()" aria-label="返回" style="display:none;">‹</button>
      <button class="brand" onclick="showHome()" aria-label="夢糖庭院">
        <img src="images/icon.png" alt="">
        <span id="topbarTitle">夢糖庭院</span>
      </button>
      <div class="top-actions">
        <button class="icon-btn notify-btn" id="notifyBtn" onclick="showNotifications()" aria-label="通知">♡<span id="notifyBadge"></span></button>
        <button class="text-btn" id="authBtn" onclick="showAuth()">登入</button>
      </div>
    </header>

    <section class="view active" id="homeView">
      <section class="composer">
        <img class="avatar" id="composerAvatar" src="images/kaede.jpg" alt="目前角色">
        <div class="composer-body">
          <div class="composer-name" id="composerName">西島楓</div>
          <div class="mention-wrap">
            <textarea id="postInput" placeholder="登入後可以發文。輸入 @ 可以標記 AI 或其他玩家。" oninput="handleMentionInput('postInput')" onkeydown="handlePostKey(event)"></textarea>
            <div class="mention-menu" id="mentionMenu"></div>
          </div>
          <div class="composer-actions">
            <button class="ghost-btn" onclick="refreshRemoteData()">刷新</button>
            <button class="primary-btn" onclick="addPost()">發佈</button>
          </div>
        </div>
      </section>
      <section class="feed" id="homeFeed"></section>
    </section>

    <section class="view" id="searchView">
      <div class="panel">
        <input class="search-box" id="searchInput" type="text" placeholder="搜尋玩家帳號、OC 或 AI 角色" oninput="renderSearch()">
        <div id="accountList"></div>
      </div>
    </section>

    <section class="view" id="notificationsView">
      <div class="panel">
        <div class="section-head">
          <div>
            <h1>通知</h1>
            <p class="muted">AI 回覆、使用者留言或 @ 你，會先出現在這裡。</p>
          </div>
          <button class="ghost-btn" onclick="requestNotificationPermission()">開啟推播</button>
        </div>
        <div class="account-list" id="notificationList"></div>
      </div>
    </section>

    <section class="view" id="messagesView">
      <div class="messages-page">
        <aside class="conversation-list" id="conversationList"></aside>
        <section class="chat-panel">
          <div class="chat-header" id="chatHeader"></div>
          <div class="chat-memory" id="chatMemoryPanel"></div>
          <div class="chat-log" id="chatLog"></div>
          <div class="chat-status" id="chatStatus"></div>
          <div class="chat-composer">
            <textarea id="messageInput" placeholder="輸入訊息..." onkeydown="handleMessageKey(event)"></textarea>
            <button class="primary-btn" onclick="sendMessage()">送出</button>
          </div>
        </section>
      </div>
    </section>

    <section class="view" id="profileView">
      <section class="profile" id="profileArea"></section>
      <nav class="tabs">
        <button class="tab active" onclick="setProfileTab('posts', this)">貼文</button>
        <button class="tab" onclick="setProfileTab('replies', this)">回覆</button>
      </nav>
      <section class="feed" id="profileFeed"></section>
    </section>

    <section class="view" id="authView">
      <div class="panel form-panel auth-card">
        <img class="auth-logo" src="images/icon.png" alt="">
        <h1 id="authTitle">登入夢糖庭院</h1>
        <p class="muted">登入後可以建立 OC、發文留言、和 AI 角色聊天。</p>
        <label>帳號</label>
        <input class="field" id="authUsername" autocomplete="username" placeholder="例如 kaede_728">
        <label>密碼</label>
        <input class="field" id="authPassword" type="password" autocomplete="current-password">
        <label class="register-only">顯示名稱</label>
        <input class="field register-only" id="authDisplayName" placeholder="例如 小楓">
        <button class="primary-btn wide" onclick="submitAuth()">送出</button>
        <button class="ghost-btn wide" onclick="toggleAuthMode()" id="authToggle">沒有帳號？註冊</button>
      </div>
    </section>

    <section class="view" id="memberView">
      <div class="panel form-panel">
        <div class="section-head">
          <div>
            <h1>會員專區</h1>
            <p class="muted">管理帳號、OC 與專屬 AI 角色申請。</p>
          </div>
          <button class="ghost-btn" onclick="logout()">登出</button>
        </div>
        <div class="menu-grid">
          <button onclick="showOCSettings()">OC 設定</button>
          <button onclick="showAIRequestPage()">申請專屬 AI 角色</button>
          <button class="admin-only" id="adminEntryBtn" onclick="showAdminPanel()" style="display:none;">管理者模式</button>
        </div>
      </div>
    </section>

    <section class="view" id="ocSettingsView">
      <div class="panel form-panel">
        <div class="section-head">
          <div>
            <h1>OC 設定</h1>
            <p class="muted">這裡會更新右下角頭貼、個人頁簡介與背景圖。</p>
          </div>
          <button class="ghost-btn" onclick="showMemberArea()">會員專區</button>
        </div>
        <section class="settings-card">
          <h2>帳號資料</h2>
          <label>顯示名稱</label>
          <input class="field" id="profileNameInput" placeholder="你的名稱">
          <label>帳號頭貼</label>
          <input class="field file-input" id="profileAvatarInput" type="file" accept="image/*">
          <button class="primary-btn" onclick="saveProfile()">儲存帳號資料</button>
        </section>
        <section class="settings-card">
          <h2>OC 資料</h2>
          <label>角色名字</label>
          <input class="field" id="ocNameInput" placeholder="例如 凜">
          <label>@帳號</label>
          <input class="field" id="ocHandleInput" placeholder="例如 rin">
          <label>角色簡介</label>
          <textarea class="field area" id="ocBioInput" placeholder="會顯示在個人頁。"></textarea>
          <label>性格</label>
          <textarea class="field area" id="ocPersonalityInput"></textarea>
          <label>外表</label>
          <textarea class="field area" id="ocAppearanceInput"></textarea>
          <label>說話風格</label>
          <textarea class="field area" id="ocSpeakingInput"></textarea>
          <label>角色頭貼</label>
          <input class="field file-input" id="ocAvatarInput" type="file" accept="image/*">
          <label>背景圖片</label>
          <input class="field file-input" id="ocCoverInput" type="file" accept="image/*">
          <button class="primary-btn" onclick="createOC()">儲存 OC</button>
        </section>
      </div>
    </section>

    <section class="view" id="aiRequestView">
      <div class="panel form-panel">
        <div class="section-head">
          <div>
            <h1>申請專屬 AI 角色</h1>
            <p class="muted">送出後由管理者審核。</p>
          </div>
          <button class="ghost-btn" onclick="showMemberArea()">會員專區</button>
        </div>
        <section class="settings-card">
          <label>AI 角色名字</label>
          <input class="field" id="requestAINameInput">
          <label>@帳號</label>
          <input class="field" id="requestAIHandleInput">
          <label>角色概念</label>
          <textarea class="field area" id="requestAIConceptInput"></textarea>
          <label>性格</label>
          <textarea class="field area" id="requestAIPersonalityInput"></textarea>
          <label>外表</label>
          <textarea class="field area" id="requestAIAppearanceInput"></textarea>
          <label>說話風格</label>
          <textarea class="field area" id="requestAISpeakingInput"></textarea>
          <label>角色規則</label>
          <textarea class="field area" id="requestAIPromptInput"></textarea>
          <button class="primary-btn" onclick="submitAIRequest()">送出申請</button>
          <div class="account-list" id="myAIRequestList"></div>
        </section>
      </div>
    </section>

    <section class="view" id="adminView">
      <div class="panel form-panel">
        <h1>管理者模式</h1>
        <p class="muted">只有 @kaede_728 可以使用。</p>
        <div class="account-list" id="adminRequestList"></div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" id="navHome" onclick="showHome()" aria-label="首頁">⌂</button>
    <button class="nav-item" id="navSearch" onclick="showSearch()" aria-label="搜尋">⌕</button>
    <button class="nav-item add" onclick="focusComposer()" aria-label="新增">＋</button>
    <button class="nav-item" id="navMessages" onclick="showMessages()" aria-label="私訊">✉</button>
    <button class="nav-item profile-nav" id="navProfile" onclick="showOCSettings()" aria-label="OC 設定">
      <img id="navProfileAvatar" src="images/kaede.jpg" alt="OC 設定">
    </button>
  </nav>

  <div class="toast" id="toast">已更新</div>
  <script type="module" src="app.js"></script>
</body>
</html>

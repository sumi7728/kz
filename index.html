<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Diary</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f6f4f2;
      --page: #ffffff;
      --text: #111111;
      --sub: #777777;
      --soft: #f7f7f7;
      --line: #ebebeb;
      --dark: #111111;
      --pink: #f6d7df;
      --brown: #6f4f46;
      --heart: #e94b75;
      --shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(246, 215, 223, 0.45), transparent 32%),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
    }

    button,
    input,
    textarea {
      font-family: inherit;
    }

    button {
      border: none;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    .page {
      width: min(100%, 520px);
      min-height: 100vh;
      margin: 0 auto;
      background: var(--page);
      position: relative;
      padding-bottom: 74px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    .profile {
      position: relative;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .cover {
      height: 168px;
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.22)),
        url("images/cover.jpg");
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 45%, rgba(255,255,255,0.98));
    }

    .top-floating {
      position: absolute;
      top: 12px;
      left: 14px;
      right: 14px;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
    }

    .profile-inner {
      padding: 0 18px 18px;
      margin-top: -38px;
      position: relative;
      z-index: 3;
    }

    .identity-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
    }

    .avatars {
      display: flex;
      align-items: flex-end;
    }

    .avatar-big {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      object-fit: cover;
      background: #eee;
      border: 4px solid #fff;
      box-shadow: var(--shadow);
    }

    .avatar-big.yan {
      width: 66px;
      height: 66px;
      margin-left: -24px;
      background: #111;
    }

    .follow-btn {
      height: 36px;
      padding: 0 16px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.13);
    }

    .name-block {
      margin-top: 13px;
    }

    .display-name {
      font-size: 25px;
      font-weight: 850;
      letter-spacing: -0.8px;
      line-height: 1.2;
    }

    .handle {
      margin-top: 3px;
      font-size: 14px;
      color: var(--sub);
    }

    .bio {
      margin-top: 12px;
      font-size: 14.5px;
      line-height: 1.65;
      color: #222;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
    }

    .tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: #f8f2f4;
      color: #8a5965;
      font-size: 12.5px;
      font-weight: 650;
    }

    .stats {
      display: flex;
      gap: 18px;
      margin-top: 14px;
      color: #222;
      font-size: 13.5px;
    }

    .stats strong {
      font-weight: 800;
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 30;
      height: 46px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .tab {
      position: relative;
      color: var(--sub);
      font-size: 14px;
      font-weight: 750;
    }

    .tab.active {
      color: #111;
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 0;
      height: 2px;
      border-radius: 999px;
      background: #111;
    }

    .composer {
      display: flex;
      gap: 12px;
      padding: 15px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      background: #eee;
      flex-shrink: 0;
    }

    .composer-main {
      flex: 1;
      min-width: 0;
    }

    .composer-name {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .composer textarea {
      width: 100%;
      min-height: 54px;
      border: none;
      resize: none;
      outline: none;
      font-size: 15px;
      line-height: 1.6;
      color: #111;
    }

    .composer textarea::placeholder {
      color: #aaa;
    }

    .preview {
      display: none;
      position: relative;
      margin-top: 10px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--soft);
    }

    .preview.show {
      display: block;
    }

    .preview img {
      width: 100%;
      display: block;
      max-height: 420px;
      object-fit: cover;
    }

    .remove-preview {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-size: 18px;
      line-height: 30px;
      text-align: center;
    }

    .composer-bottom {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tools {
      display: flex;
      gap: 15px;
      align-items: center;
      color: var(--sub);
      font-size: 19px;
    }

    .file-label {
      cursor: pointer;
      line-height: 1;
    }

    #imageInput {
      display: none;
    }

    .post-btn {
      padding: 7px 17px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 14px;
      font-weight: 750;
    }

    .feed {
      background: #fff;
    }

    .thread {
      display: flex;
      gap: 12px;
      padding: 16px 18px 0;
      border-bottom: 1px solid var(--line);
    }

    .thread-left {
      width: 42px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .thread-line {
      width: 2px;
      flex: 1;
      margin-top: 8px;
      border-radius: 999px;
      background: var(--line);
    }

    .thread-main {
      flex: 1;
      min-width: 0;
      padding-bottom: 16px;
    }

    .post-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .author {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 5px;
      min-width: 0;
    }

    .post-name {
      font-size: 14.5px;
      font-weight: 850;
    }

    .post-id,
    .post-time {
      font-size: 13px;
      color: var(--sub);
    }

    .more {
      color: var(--sub);
      font-size: 19px;
      line-height: 1;
    }

    .post-text {
      margin-top: 5px;
      font-size: 15px;
      line-height: 1.68;
      white-space: pre-line;
      color: #171717;
    }

    .post-photo {
      margin-top: 11px;
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--soft);
    }

    .post-photo img {
      width: 100%;
      display: block;
      max-height: 460px;
      object-fit: cover;
    }

    .actions {
      display: flex;
      gap: 18px;
      margin-top: 12px;
      font-size: 20px;
    }

    .action {
      line-height: 1;
      transition: 0.18s;
    }

    .action.liked {
      color: var(--heart);
    }

    .meta {
      margin-top: 9px;
      font-size: 13.5px;
      color: var(--sub);
    }

    .reply {
      display: flex;
      gap: 11px;
      padding-top: 14px;
    }

    .reply .avatar {
      width: 32px;
      height: 32px;
    }

    .reply-main {
      flex: 1;
      min-width: 0;
    }

    .reply-head {
      display: flex;
      gap: 5px;
      align-items: baseline;
    }

    .reply-name {
      font-size: 13.5px;
      font-weight: 850;
    }

    .reply-id {
      font-size: 12.5px;
      color: var(--sub);
    }

    .reply-text {
      margin-top: 3px;
      font-size: 14px;
      line-height: 1.6;
      color: #222;
    }

    .reply-actions {
      margin-top: 8px;
      display: flex;
      gap: 15px;
      font-size: 16px;
    }

    .delete-btn {
      margin-top: 10px;
      color: #d34a4a;
      font-size: 13px;
      font-weight: 700;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      z-index: 70;
      width: min(100%, 520px);
      height: 62px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(18px);
      border-top: 1px solid var(--line);
      box-shadow: 0 -8px 22px rgba(0, 0, 0, 0.035);
    }

    .nav-item {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      color: #111;
    }

    .nav-item.add {
      font-size: 28px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 82px;
      transform: translateX(-50%) translateY(16px);
      width: calc(100% - 40px);
      max-width: 420px;
      padding: 12px 15px;
      border-radius: 999px;
      background: rgba(17, 17, 17, 0.92);
      color: #fff;
      font-size: 14px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s;
      z-index: 90;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 760px) {
      .page {
        margin-top: 28px;
        margin-bottom: 28px;
        border-radius: 30px;
        overflow: hidden;
        min-height: calc(100vh - 56px);
      }

      .bottom-nav {
        border-radius: 0 0 30px 30px;
      }
    }

    @media (max-width: 380px) {
      .cover {
        height: 150px;
      }

      .profile-inner,
      .composer,
      .thread {
        padding-left: 15px;
        padding-right: 15px;
      }

      .display-name {
        font-size: 22px;
      }

      .avatar-big {
        width: 78px;
        height: 78px;
      }

      .avatar-big.yan {
        width: 60px;
        height: 60px;
      }

      .tab {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="profile">
      <div class="cover">
        <div class="top-floating">
          <button class="icon-btn" onclick="showToast('已回到頂部')">⌂</button>
          <button class="icon-btn" onclick="showMoreMenu()">⋯</button>
        </div>
      </div>

      <div class="profile-inner">
        <div class="identity-row">
          <div class="avatars">
            <img class="avatar-big" src="images/kaede.jpg" alt="西島楓" onerror="this.style.visibility='hidden'">
            <img class="avatar-big yan" src="images/zhihao.jpg" alt="嚴志豪" onerror="this.style.visibility='hidden'">
          </div>

          <button class="follow-btn" onclick="focusComposer()">新增紀錄</button>
        </div>

        <div class="name-block">
          <h1 class="display-name">西島楓與嚴志豪</h1>
          <div class="handle">@kaede_zhihao_daily</div>
        </div>

        <p class="bio">
          花園、漢江、晚餐、冷戰、吃醋，還有那些被嚴志豪管著卻又偷偷心動的日常。
        </p>

        <div class="tags">
          <span class="tag">#嚴太太</span>
          <span class="tag">#理事長</span>
          <span class="tag">#夫妻日常</span>
          <span class="tag">#韓國生活</span>
        </div>

        <div class="stats">
          <span><strong id="postCount">0</strong> 則貼文</span>
          <span><strong>128</strong> 次吃醋</span>
          <span><strong>56</strong> 次牽手</span>
        </div>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab active" onclick="filterPosts('all', this)">日常</button>
      <button class="tab" onclick="filterPosts('media', this)">照片</button>
      <button class="tab" onclick="filterPosts('jealous', this)">吃醋</button>
      <button class="tab" onclick="filterPosts('reply', this)">回覆</button>
    </nav>

    <section class="composer" id="composer">
      <img class="avatar" src="images/kaede.jpg" alt="西島楓" onerror="this.style.visibility='hidden'">

      <div class="composer-main">
        <div class="composer-name">西島楓</div>

        <textarea id="postInput" placeholder="今天想記錄什麼？"></textarea>

        <div class="preview" id="previewBox">
          <button class="remove-preview" onclick="removePreview()">×</button>
          <img id="previewImage" src="" alt="預覽圖片">
        </div>

        <div class="composer-bottom">
          <div class="tools">
            <label class="file-label" for="imageInput">📷</label>
            <span onclick="showToast('之後可以加標籤功能')">#</span>
            <span onclick="showToast('目前是本機保存')">♡</span>
          </div>

          <input id="imageInput" type="file" accept="image/*" onchange="handleImageUpload(event)">
          <button class="post-btn" onclick="addPost()">發布</button>
        </div>
      </div>
    </section>

    <section class="feed" id="feed"></section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item" onclick="filterPostsByNav('all')">⌂</button>
    <button class="nav-item" onclick="showToast('搜尋功能之後可以加')">⌕</button>
    <button class="nav-item add" onclick="focusComposer()">＋</button>
    <button class="nav-item" onclick="filterPostsByNav('media')">♡</button>
    <button class="nav-item" onclick="showMoreMenu()">◉</button>
  </nav>

  <div class="toast" id="toast">提示</div>

  <script>
    const STORAGE_KEY = "kaede_zhihao_threads_posts_pretty_v1";

    let currentFilter = "all";
    let selectedImageData = "";

    const defaultPosts = [
      {
        id: 1,
        category: "jealous",
        author: "西島楓",
        handle: "@kaede",
        avatar: "kaede",
        time: "剛剛",
        text: "今天只是想穿短裙去花園澆花，結果嚴志豪從客廳看了我一眼，下一秒就把外套披到我肩上。\n\n我說又沒有人會看，他只淡淡回我一句：外面有監視器，也有鄰居。",
        image: "",
        likes: 256,
        replies: 38,
        replyAuthor: "嚴志豪",
        replyHandle: "@zhihao",
        replyAvatar: "yan",
        replyText: "不是不讓妳穿，是妳沒必要讓別人看見。",
        local: false
      },
      {
        id: 2,
        category: "media",
        author: "嚴志豪",
        handle: "@zhihao",
        avatar: "yan",
        time: "1 小時",
        text: "她說只是出門買甜點，結果在櫥窗前看了二十分鐘。最後買回來第一口還要先餵我，理由是這樣比較像約會。",
        image: "images/cover.jpg",
        likes: 412,
        replies: 59,
        replyAuthor: "西島楓",
        replyHandle: "@kaede",
        replyAvatar: "kaede",
        replyText: "你明明就有吃掉，還裝得好像被我逼的一樣。",
        local: false
      },
      {
        id: 3,
        category: "reply",
        author: "西島楓",
        handle: "@kaede",
        avatar: "kaede",
        time: "昨天",
        text: "晚上在漢江邊散步，我說手有點冷，嚴志豪沒有說話，只是把我的手整個放進他的大衣口袋裡。",
        image: "",
        likes: 688,
        replies: 92,
        replyAuthor: "嚴志豪",
        replyHandle: "@zhihao",
        replyAvatar: "yan",
        replyText: "冷就靠近一點，不要等我提醒。",
        local: false
      }
    ];

    let posts = loadPosts();

    function loadPosts() {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (!saved) {
        return [...defaultPosts];
      }

      try {
        const localPosts = JSON.parse(saved);
        return [...localPosts, ...defaultPosts];
      } catch (error) {
        return [...defaultPosts];
      }
    }

    function saveLocalPosts() {
      const localPosts = posts.filter(post => post.local);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(localPosts));
    }

    function getAvatarSrc(type) {
      return type === "yan" ? "images/zhihao.jpg" : "images/kaede.jpg";
    }

    function renderPosts() {
      const feed = document.getElementById("feed");
      const postCount = document.getElementById("postCount");

      const filtered = currentFilter === "all"
        ? posts
        : posts.filter(post => {
            if (currentFilter === "media") return post.image;
            return post.category === currentFilter;
          });

      postCount.textContent = posts.length;

      if (filtered.length === 0) {
        feed.innerHTML = `
          <div style="padding: 38px 18px; text-align:center; color:#777; border-bottom:1px solid #ebebeb;">
            這裡還沒有貼文。
          </div>
        `;
        return;
      }

      feed.innerHTML = filtered.map(post => `
        <article class="thread">
          <div class="thread-left">
            <img class="avatar" src="${getAvatarSrc(post.avatar)}" alt="${post.author}" onerror="this.style.visibility='hidden'">
            <div class="thread-line"></div>
          </div>

          <div class="thread-main">
            <div class="post-head">
              <div class="author">
                <span class="post-name">${post.author}</span>
                <span class="post-id">${post.handle}</span>
                <span class="post-time">· ${post.time}</span>
              </div>

              <button class="more" onclick="showPostMenu(${post.id})">⋯</button>
            </div>

            <p class="post-text">${escapeHTML(post.text)}</p>

            ${post.image ? `
              <div class="post-photo">
                <img src="${post.image}" alt="日常照片" onerror="this.parentElement.style.display='none'">
              </div>
            ` : ""}

            <div class="actions">
              <button class="action" onclick="toggleLike(this)">♡</button>
              <button class="action" onclick="showToast('回覆 ${post.author}')">💬</button>
              <button class="action" onclick="showToast('已轉發')">↻</button>
              <button class="action" onclick="showToast('已分享')">↗</button>
            </div>

            <div class="meta">${post.replies} 則回覆 · ${post.likes} 個喜歡</div>

            <div class="reply">
              <img class="avatar" src="${getAvatarSrc(post.replyAvatar)}" alt="${post.replyAuthor}" onerror="this.style.visibility='hidden'">

              <div class="reply-main">
                <div class="reply-head">
                  <span class="reply-name">${post.replyAuthor}</span>
                  <span class="reply-id">${post.replyHandle}</span>
                </div>

                <p class="reply-text">${escapeHTML(post.replyText)}</p>

                <div class="reply-actions">
                  <button class="action" onclick="toggleLike(this)">♡</button>
                  <button class="action" onclick="showToast('回覆 ${post.replyAuthor}')">💬</button>
                </div>

                ${post.local ? `
                  <button class="delete-btn" onclick="deletePost(${post.id})">刪除這則紀錄</button>
                ` : ""}
              </div>
            </div>
          </div>
        </article>
      `).join("");
    }

    function filterPosts(filter, button) {
      currentFilter = filter;

      document.querySelectorAll(".tab").forEach(tab => {
        tab.classList.remove("active");
      });

      button.classList.add("active");
      renderPosts();
    }

    function filterPostsByNav(filter) {
      currentFilter = filter;

      document.querySelectorAll(".tab").forEach(tab => {
        tab.classList.remove("active");
      });

      if (filter === "all") document.querySelectorAll(".tab")[0].classList.add("active");
      if (filter === "media") document.querySelectorAll(".tab")[1].classList.add("active");

      renderPosts();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function handleImageUpload(event) {
      const file = event.target.files[0];

      if (!file) return;

      if (!file.type.startsWith("image/")) {
        showToast("請選擇圖片檔");
        return;
      }

      if (file.size > 4 * 1024 * 1024) {
        showToast("圖片太大，建議 4MB 以下");
        event.target.value = "";
        return;
      }

      const reader = new FileReader();

      reader.onload = function(e) {
        selectedImageData = e.target.result;
        document.getElementById("previewImage").src = selectedImageData;
        document.getElementById("previewBox").classList.add("show");
      };

      reader.readAsDataURL(file);
    }

    function removePreview() {
      selectedImageData = "";
      document.getElementById("imageInput").value = "";
      document.getElementById("previewImage").src = "";
      document.getElementById("previewBox").classList.remove("show");
    }

    function addPost() {
      const input = document.getElementById("postInput");
      const text = input.value.trim();

      if (!text && !selectedImageData) {
        showToast("先寫一點日常或選一張照片");
        return;
      }

      const category = selectedImageData ? "media" : guessCategory(text);

      const newPost = {
        id: Date.now(),
        category,
        author: "西島楓",
        handle: "@kaede",
        avatar: "kaede",
        time: "剛剛",
        text: text || "新增了一張日常照片。",
        image: selectedImageData,
        likes: 0,
        replies: 0,
        replyAuthor: "嚴志豪",
        replyHandle: "@zhihao",
        replyAvatar: "yan",
        replyText: getYanReply(category),
        local: true
      };

      posts.unshift(newPost);
      saveLocalPosts();

      input.value = "";
      removePreview();

      currentFilter = "all";
      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
      document.querySelectorAll(".tab")[0].classList.add("active");

      renderPosts();
      showToast("已發布");
    }

    function deletePost(id) {
      const ok = confirm("確定要刪除這則紀錄嗎？");

      if (!ok) return;

      posts = posts.filter(post => post.id !== id);
      saveLocalPosts();
      renderPosts();
      showToast("已刪除");
    }

    function clearLocalPosts() {
      const ok = confirm("確定清空自己新增的紀錄嗎？");

      if (!ok) return;

      posts = posts.filter(post => !post.local);
      localStorage.removeItem(STORAGE_KEY);
      renderPosts();
      showToast("已清空");
    }

    function guessCategory(text) {
      const t = text.toLowerCase();

      if (t.includes("吃醋") || t.includes("男人") || t.includes("別人") || t.includes("靠近")) {
        return "jealous";
      }

      if (t.includes("照片") || t.includes("拍") || t.includes("圖片")) {
        return "media";
      }

      if (t.includes("說") || t.includes("問") || t.includes("回覆")) {
        return "reply";
      }

      return "all";
    }

    function getYanReply(category) {
      const replies = {
        jealous: "我不喜歡別人靠近妳，這件事不需要再問。",
        media: "照片可以留，但不要發太多。",
        reply: "我聽見了。",
        all: "我看到了。"
      };

      return replies[category] || replies.all;
    }

    function toggleLike(button) {
      if (button.classList.contains("liked")) {
        button.classList.remove("liked");
        button.textContent = "♡";
      } else {
        button.classList.add("liked");
        button.textContent = "♥";
      }
    }

    function focusComposer() {
      const composer = document.getElementById("composer");
      const input = document.getElementById("postInput");

      composer.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });

      setTimeout(() => input.focus(), 300);
    }

    function showMoreMenu() {
      const choice = prompt("輸入 1：清空本機新增紀錄\n輸入 2：查看保存說明");

      if (choice === "1") clearLocalPosts();

      if (choice === "2") {
        alert("目前是本機保存，不用資料庫、不花錢。貼文只會存在這台手機或這個瀏覽器。");
      }
    }

    function showPostMenu(id) {
      const post = posts.find(item => item.id === id);

      if (!post) return;

      if (post.local) {
        const choice = prompt("輸入 1：刪除這則紀錄\n輸入 2：取消");

        if (choice === "1") deletePost(id);
      } else {
        showToast("這是預設展示貼文");
      }
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 1600);
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>"']/g, function(match) {
        const escapeMap = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        };

        return escapeMap[match];
      });
    }

    renderPosts();
  </script>
</body>
</html>

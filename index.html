<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色社群</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <header class="topbar">
      <button class="topbar-left" id="backBtn" onclick="goBack()" style="display:none;">‹</button>
      <div class="topbar-title" id="topbarTitle">動態</div>
      <button class="topbar-right" onclick="showOCManager()">OC</button>
    </header>

    <section class="view active" id="homeView">
      <section class="composer" id="composer">
        <img class="avatar" id="composerAvatar" src="images/kaede.jpg" alt="我的頭貼">
        <div class="composer-main">
          <div class="composer-name" id="composerName">匿名玩家</div>
          <div class="mention-wrap">
            <textarea id="postInput" placeholder="發一則動態，輸入 @ 可以標記角色。沒標記時預設 @kaede 西島楓。" oninput="handlePostInput()" onkeydown="handlePostKey(event)"></textarea>
            <div class="mention-menu" id="mentionMenu"></div>
          </div>
          <div class="composer-bottom">
            <button class="tool-btn" onclick="refreshRemoteData()" title="重新整理">↻</button>
            <button class="post-btn" onclick="addPost()">發布</button>
          </div>
        </div>
      </section>
      <section class="feed" id="homeFeed"></section>
    </section>

    <section class="view" id="profileView">
      <section class="profile" id="profileArea"></section>
      <nav class="tabs">
        <button class="tab active" onclick="setProfileTab('posts', this)">貼文</button>
        <button class="tab" onclick="setProfileTab('replies', this)">回覆</button>
      </nav>
      <section class="feed" id="profileFeed"></section>
    </section>

    <section class="view" id="searchView">
      <div class="search-page">
        <input class="search-box" id="searchInput" type="text" placeholder="搜尋角色或 OC" oninput="renderSearch()">
        <div class="account-list" id="accountList"></div>
      </div>
    </section>

    <section class="view" id="messagesView">
      <div class="messages-page">
        <aside class="conversation-list" id="conversationList"></aside>
        <section class="chat-panel">
          <div class="chat-header" id="chatHeader"></div>
          <div class="chat-log" id="chatLog"></div>
          <div class="chat-status" id="chatStatus"></div>
          <div class="chat-composer">
            <textarea id="messageInput" placeholder="輸入私訊..." onkeydown="handleMessageKey(event)"></textarea>
            <button class="post-btn" onclick="sendMessage()">傳送</button>
          </div>
        </section>
      </div>
    </section>

    <section class="view" id="ocView">
      <div class="admin-page">
        <div class="admin-header">
          <div>
            <h2>我的設定與 OC</h2>
            <p>設定匿名暱稱、頭貼，建立可以被 @ 標記的角色。</p>
          </div>
          <button class="admin-small-btn" onclick="showHome()">回動態</button>
        </div>

        <div class="admin-card">
          <h3>匿名身分</h3>
          <label class="admin-label">暱稱</label>
          <input class="admin-input" id="profileNameInput" placeholder="例如：小楓">
          <label class="admin-label">頭貼</label>
          <input class="admin-input file-input" id="profileAvatarInput" type="file" accept="image/*">
          <button class="admin-btn dark" onclick="saveProfile()">儲存身分</button>
        </div>

        <div class="admin-card">
          <h3>建立我的角色 OC</h3>
          <label class="admin-label">角色名稱</label>
          <input class="admin-input" id="ocNameInput" placeholder="例如：霧島凜">
          <label class="admin-label">帳號</label>
          <input class="admin-input" id="ocHandleInput" placeholder="例如：rin，發文時可 @rin">
          <label class="admin-label">性格</label>
          <textarea class="admin-textarea" id="ocPersonalityInput" placeholder="例如：嘴硬、護短、很會吃醋，但不會直接承認。"></textarea>
          <label class="admin-label">外表</label>
          <textarea class="admin-textarea" id="ocAppearanceInput" placeholder="例如：黑髮、冷白皮、常穿深色外套。"></textarea>
          <label class="admin-label">說話方式</label>
          <textarea class="admin-textarea" id="ocSpeakingInput" placeholder="例如：短句、低聲、偶爾毒舌，只回一句。"></textarea>
          <label class="admin-label">角色頭貼</label>
          <input class="admin-input file-input" id="ocAvatarInput" type="file" accept="image/*">
          <button class="admin-btn dark" onclick="createOC()">新增 OC</button>
        </div>

        <div class="admin-card">
          <h3>我的 OC</h3>
          <div class="account-list" id="myOCList"></div>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" id="navHome" onclick="showHome()" aria-label="動態">⌂</button>
    <button class="nav-item" id="navSearch" onclick="showSearch()" aria-label="搜尋">⌕</button>
    <button class="nav-item add" onclick="focusComposer()" aria-label="新增貼文">＋</button>
    <button class="nav-item" id="navMessages" onclick="showMessages()" aria-label="私訊">✉</button>
    <button class="nav-item" id="navOC" onclick="showOCManager()" aria-label="我的 OC">OC</button>
  </nav>

  <div class="toast" id="toast">已更新</div>
  <script type="module" src="app.js"></script>
</body>
</html>

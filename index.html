<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>西島楓的日常</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <header class="topbar" id="topbar">
      <button class="topbar-left" id="backBtn" onclick="goBack()" style="display:none;">‹</button>
      <div class="topbar-title" id="topbarTitle">西島楓</div>
      <button class="topbar-right" onclick="showMoreMenu()">⋯</button>
    </header>

    <section class="view active" id="profileView">
      <section class="profile" id="profileArea"></section>

      <nav class="tabs">
        <button class="tab active" onclick="setProfileTab('posts', this)">貼文</button>
        <button class="tab" onclick="setProfileTab('media', this)">照片</button>
        <button class="tab" onclick="setProfileTab('replies', this)">回覆</button>
      </nav>

      <section class="feed" id="profileFeed"></section>
    </section>

    <section class="view" id="homeView">
      <section class="composer" id="composer">
        <img class="avatar" src="images/kaede.jpg" alt="西島楓" onerror="this.style.visibility='hidden'">

        <div class="composer-main">
          <div class="composer-name">西島楓</div>

          <textarea id="postInput" placeholder="今天想記錄什麼？"></textarea>

          <div class="preview" id="previewBox">
            <button class="remove-preview" onclick="removePreview()">×</button>
            <img id="previewImage" src="" alt="預覽圖片">
          </div>

          <div class="composer-bottom">
            <div class="tools">
              <label class="file-label" for="imageInput">📷</label>
              <span onclick="showToast('之後可以加標籤功能')">#</span>
              <span onclick="showToast('目前是本機保存')">♡</span>
            </div>

            <input id="imageInput" type="file" accept="image/*" onchange="handleImageUpload(event)">
            <button class="post-btn" onclick="addPost()">發布</button>
          </div>
        </div>
      </section>

      <section class="feed" id="homeFeed"></section>
    </section>

    <section class="view" id="searchView">
      <div class="search-page">
        <input class="search-box" id="searchInput" type="text" placeholder="搜尋帳號" oninput="renderSearch()">
        <div class="account-list" id="accountList"></div>
      </div>
    </section>

    <section class="view" id="likedView">
      <section class="feed" id="likedFeed"></section>
    </section>

    <section class="view" id="adminView">
      <div class="admin-page">
        <div class="admin-header">
          <div>
            <h2>管理者模式</h2>
            <p>可以修改貼文資料、圖片、數字與角色回覆。</p>
          </div>
          <button class="admin-small-btn" onclick="showHome()">離開</button>
        </div>

        <div class="admin-actions">
          <button class="admin-btn dark" onclick="createBlankPost()">新增空白貼文</button>
          <button class="admin-btn" onclick="generateAIPost()">AI 生成一則貼文</button>
          <button class="admin-btn" onclick="autoGenerateDays()">模擬隔 1～2 天發文</button>
          <button class="admin-btn danger" onclick="resetAllPosts()">重置全部貼文</button>
        </div>

        <label class="admin-label">選擇要編輯的貼文</label>
        <select class="admin-input" id="adminPostSelect" onchange="loadAdminEditor()"></select>

        <div class="admin-editor" id="adminEditor"></div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item" id="navHome" onclick="showHome()" aria-label="主頁">⌂</button>
    <button class="nav-item" id="navSearch" onclick="showSearch()" aria-label="搜尋">⌕</button>
    <button class="nav-item add" onclick="focusComposer()" aria-label="新增貼文">＋</button>
    <button class="nav-item" id="navLiked" onclick="showLiked()" aria-label="按讚貼文">♡</button>

    <button class="nav-item profile-nav active" id="navProfile" onclick="showProfile('kaede')" aria-label="西島楓個人檔案">
      <img src="images/kaede.jpg" alt="西島楓頭像" onerror="this.style.visibility='hidden'">
    </button>
  </nav>

  <div class="toast" id="toast">提示</div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
